<!-- Importação do Bootstrap (framework de CSS) -->

<!-- CSS personalizado do projeto -->
<link rel="stylesheet" href="css/style.css">
</head>

<!-- Classe do Bootstrap para fundo claro -->
<body class="bg-light">


<!-- =============================
     NAVBAR (MENU SUPERIOR)
============================= -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
<div class="container">

<!-- Nome/logo do sistema -->
<a class="navbar-brand" href="index.html">PetShop Cão & Gato</a>

<!-- Links de navegação -->
<div class="navbar-nav ms-auto">

<!-- Link para área administrativa -->
<a class="nav-link" href="login.html">Lista de Agendamentos</a>
</div>

</div>
</nav>


<!-- =============================
     CONTEÚDO PRINCIPAL
============================= -->
<div class="container mt-4">

<!-- Card (caixa visual) -->
<div class="card shadow">

<!-- Cabeçalho do card -->
<div class="card-header bg-primary text-white text-center">
<h3>Cadastro e Agendamento</h3>
</div>

<div class="card-body">

<!-- =============================
     FORMULÁRIO DE AGENDAMENTO
============================= -->
<form id="formAgendamento">

<!-- ===== DADOS DO CLIENTE ===== -->
<h5>Dados do Cliente</h5>

<div class="row">

<!-- Nome do cliente -->
<div class="col-md-6 mb-3">
<label>Nome Completo</label>
<input type="text" id="nome" class="form-control" required>
</div>

<!-- CPF -->
<div class="col-md-6 mb-3">
<label>CPF</label>
<input type="text" id="cpf" class="form-control" required>
</div>

</div>

<div class="row">

<!-- Telefone -->
<div class="col-md-6 mb-3">
<label>Telefone</label>
<input type="tel" id="telefone" class="form-control" required>
</div>

<!-- Email -->
<div class="col-md-6 mb-3">
<label>Email</label>
<input type="email" id="email" class="form-control" required>
</div>

</div>

<!-- Endereço -->
<div class="mb-3">
<label>Endereço</label>
<input type="text" id="endereco" class="form-control" required>
</div>

<hr>

<!-- ===== DADOS DO PET ===== -->
<h5>Dados do Pet</h5>

<div class="row">

<!-- Nome do pet -->
<div class="col-md-4 mb-3">
<label>Nome do Pet</label>
<input type="text" id="nomePet" class="form-control" required>
</div>

<!-- Raça -->
<div class="col-md-4 mb-3">
<label>Raça</label>
<input type="text" id="raca" class="form-control">
</div>

<!-- Idade -->
<div class="col-md-4 mb-3">
<label>Idade</label>
<input type="number" id="idade" class="form-control">
</div>

</div>

<hr>

<!-- ===== DADOS DO AGENDAMENTO ===== -->
<h5>Agendamento</h5>

<div class="row">

<!-- Tipo de serviço -->
<div class="col-md-4 mb-3">
<label>Serviço</label>
<select id="servico" class="form-select" required>
<option value="">Selecione</option>
<option>Banho</option>
<option>Tosa</option>
<option>Banho e Tosa</option>
</select>
</div>

<!-- Método (tele-busca ou local) -->
<div class="col-md-4 mb-3">
<label>Método</label>
<select id="metodo" class="form-select" required>
<option value="">Selecione</option>
<option>Tele-busca</option>
<option>Entrega no local</option>
</select>
</div>

<!-- Data -->
<div class="col-md-4 mb-3">
<label>Data</label>
<input type="date" id="dataAgendamento" class="form-control" required>
</div>

</div>

<div class="row">

<!-- Horário -->
<div class="col-md-4 mb-3">
<label>Horário</label>
<input type="time" id="horaAgendamento" class="form-control" required>
</div>

</div>

<!-- Botão de envio do formulário -->
<div class="text-center mt-4">
<button class="btn btn-primary btn-lg">
Confirmar Agendamento
</button>
</div>

</form>

</div>
</div>
</div>


<!-- =============================
     SCRIPT PRINCIPAL
     Responsável por:
     - capturar dados do formulário
     - salvar no localStorage
     - controlar lógica do sistema
============================= -->
<script src="js/script.js"></script>

</body>
</html>
