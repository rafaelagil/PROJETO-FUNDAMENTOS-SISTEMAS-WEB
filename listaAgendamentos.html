<!DOCTYPE html>
<html lang="pt-BR">

<head>
<!-- Configuração de caracteres (acentuação correta) -->
<meta charset="UTF-8">

<!-- Responsividade (adaptar para celular/tablet) -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Título da página -->
<title>Lista de Agendamentos - PetShop</title>

<!-- Importação do Bootstrap (estilização pronta) -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light"> <!-- Fundo claro padrão do Bootstrap -->


<!-- =============================
     NAVBAR (BARRA SUPERIOR)
============================= -->
<nav class="navbar navbar-dark bg-dark">
<div class="container">

<!-- Título do painel administrativo -->
<span class="navbar-brand">Painel Administrador</span>

<!-- Botão de logout (chama função no script.js) -->
<button class="btn btn-danger" onclick="logout()">
Sair
</button>

</div>
</nav>


<!-- =============================
     CONTEÚDO PRINCIPAL
============================= -->
<div class="container mt-4">

<!-- Cabeçalho da página com botão de novo agendamento -->
<div class="d-flex justify-content-between mb-3">

<!-- Título da lista -->
<h3>Lista de Agendamentos</h3>

<!-- Botão para redirecionar ao cadastro -->
<a href="cadastro.html" class="btn btn-success">
Novo Agendamento
</a>

</div>


<!-- =============================
     CARD (CAIXA VISUAL)
============================= -->
<div class="card shadow">
<div class="card-body">

<!-- Permite rolagem horizontal em telas menores -->
<div class="table-responsive">

<!-- Tabela de agendamentos -->
<table class="table table-striped table-hover">

<!-- Cabeçalho da tabela -->
<thead class="table-dark">
<tr>
<th>Cliente</th>
<th>Pet</th>
<th>Serviço</th>
<th>Método</th>
<th>Data</th>
<th>Hora</th>
<th>Telefone</th>
<th>Ações</th> <!-- Botão excluir -->
</tr>
</thead>

<!-- Corpo da tabela (preenchido via JavaScript) -->
<tbody id="listaAgendamentos"></tbody>

</table>
</div>

</div>
</div>

</div>


<!-- =============================
     SCRIPT PRINCIPAL
     (responsável por:
      - carregar agendamentos
      - proteger acesso (login)
      - excluir registros
      - logout)
============================= -->
<script src="js/script.js"></script>

</body>
</html>
